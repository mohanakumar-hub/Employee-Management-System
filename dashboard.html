<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; color: #2c3e50; }
        .main-content { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { margin-bottom: 15px; color: #34495e; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { width: 100%; padding: 10px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-submit { background-color: #2ecc71; color: white; }
        .btn-submit:hover { background-color: #27ae60; }
        .btn-cancel { background-color: #95a5a6; color: white; margin-top: 5px; display: none; }
        .btn-cancel:hover { background-color: #7f8c8d; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #34495e; color: white; font-weight: 600; }
        tr:hover { background-color: #f9f9f9; }
        .actions { display: flex; gap: 5px; }
        .btn-edit { background-color: #3498db; color: white; padding: 5px 10px; font-size: 12px; width: auto; }
        .btn-edit:hover { background-color: #2980b9; }
        .btn-delete { background-color: #e74c3c; color: white; padding: 5px 10px; font-size: 12px; width: auto; }
        .btn-delete:hover { background-color: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Employee Management System</h1>
    </header>

    <div class="main-content">
        <div class="card">
            <h3 id="form-title">Add New Employee</h3>
            <form id="employee-form">
                <input type="hidden" id="employee-id">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="position">Job Position</label>
                    <input type="text" id="position" required placeholder="Software Engineer">
                </div>
                <div class="form-group">
                    <label for="salary">Monthly Salary ($)</label>
                    <input type="number" id="salary" required placeholder="5000">
                </div>
                <button type="submit" class="btn-submit" id="btn-save">Save Employee</button>
                <button type="button" class="btn-cancel" id="btn-cancel" onclick="resetForm()">Cancel Edit</button>
            </form>
        </div>

        <div class="card">
            <h3>Employee Database Records</h3>
            <table id="employee-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Position</th>
                        <th>Salary</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="employee-list">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_URL = '/api/employees';
    const form = document.getElementById('employee-form');
    const employeeList = document.getElementById('employee-list');
    const formTitle = document.getElementById('form-title');
    const btnSave = document.getElementById('btn-save');
    const btnCancel = document.getElementById('btn-cancel');

    // Fetch and display all employees on page load
    document.addEventListener('DOMContentLoaded', fetchEmployees);

    async function fetchEmployees() {
        try {
            const response = await fetch(API_URL);
            const employees = await response.json();
            employeeList.innerHTML = '';
            
            employees.forEach(emp => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${emp.name}</td>
                    <td>${emp.email}</td>
                    <td>${emp.position}</td>
                    <td>$${emp.salary}</td>
                    <td class="actions">
                        <button class="btn-edit" onclick="editEmployee('${emp._id}', '${emp.name}', '${emp.email}', '${emp.position}', ${emp.salary})">Edit</button>
                        <button class="btn-delete" onclick="deleteEmployee('${emp._id}')">Delete</button>
                    </td>
                `;
                employeeList.appendChild(row);
            });
        } catch (error) {
            console.error('Error fetching data:', error);
        }
    }

    // Handle Form Submit (Create or Update)
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const id = document.getElementById('employee-id').value;
        const employeeData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            position: document.getElementById('position').value,
            salary: document.getElementById('salary').value
        };

        try {
            let response;
            if (id) {
                // Update existing employee
                response = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(employeeData)
                });
            } else {
                // Create new employee
                response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(employeeData)
                });
            }

            const result = await response.json();
            if (response.ok) {
                alert(result.message);
                resetForm();
                fetchEmployees();
            } else {
                alert(result.error);
            }
        } catch (error) {
            console.error('Error processing request:', error);
        }
    });

    // Populate form fields for editing
    function editEmployee(id, name, email, position, salary) {
        document.getElementById('employee-id').value = id;
        document.getElementById('name').value = name;
        document.getElementById('email').value = email;
        document.getElementById('position').value = position;
        document.getElementById('salary').value = salary;

        formTitle.innerText = "Edit Employee Details";
        btnSave.innerText = "Update Details";
        btnCancel.style.display = "block";
    }

    // Delete an employee record
    async function deleteEmployee(id) {
        if (confirm('Are you sure you want to delete this employee record?')) {
            try {
                const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                const result = await response.json();
                if (response.ok) {
                    alert(result.message);
                    fetchEmployees();
                }
            } catch (error) {
                console.error('Error deleting employee:', error);
            }
        }
    }

    // Reset form states
    function resetForm() {
        form.reset();
        document.getElementById('employee-id').value = '';
        formTitle.innerText = "Add New Employee";
        btnSave.innerText = "Save Employee";
        btnCancel.style.display = "none";
    }
</script>
</body>
</html>
